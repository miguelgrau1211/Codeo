<!-- Card Container -->
<div class="relative flex flex-col h-full p-1 rounded-2xl transition-all duration-300 group preserve-3d" [ngClass]="{
        'hover:-translate-y-2': desbloqueado,
        'opacity-50 grayscale': !desbloqueado
    }">

    <!-- Outer Glow/Border Gradient -->
    <div class="absolute inset-0 rounded-2xl bg-gradient-to-br from-white/10 to-white/0 -z-10 transition-all duration-500 blur-sm opacity-0 group-hover:opacity-100"
        [ngClass]="cardHoverGlow"></div>

    <!-- Main Card Content — Two Column Layout -->
    <div
        class="flex flex-row items-center h-full bg-slate-900/90 backdrop-blur-md rounded-xl p-5 border border-white/5 relative overflow-hidden transition-colors group-hover:bg-slate-800/90 group-hover:border-white/10 gap-5">

        <!-- Shine Effect -->
        <div
            class="absolute inset-0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000 bg-gradient-to-r from-transparent via-white/5 to-transparent skew-x-12 z-20 pointer-events-none">
        </div>

        <!-- LEFT: Text Content -->
        <div class="flex-1 relative z-10 min-w-0">
            <!-- Rarity Pill -->
            <div class="mb-2">
                <span
                    class="inline-block px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase tracking-widest border bg-slate-950/50 border-white/10 text-transparent bg-clip-text bg-gradient-to-r"
                    [ngClass]="rarezaGradient">
                    {{ rarezaLabel | translate }}
                </span>
            </div>

            <!-- Title -->
            <h3
                class="text-base font-bold text-white mb-1 leading-tight group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-white group-hover:to-slate-300 transition-all">
                {{ nombre | translate }}
            </h3>

            <!-- Description -->
            <p class="text-[11px] text-slate-400 leading-relaxed line-clamp-2 mb-3">
                {{ descripcion | translate }}
            </p>

            <!-- Status -->
            <div class="flex items-center gap-1.5">
                <span *ngIf="desbloqueado" class="text-[11px] text-green-400 flex items-center gap-1 font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    {{ 'ACHIEVEMENTS.UNLOCKED_STATUS' | translate }}
                </span>
                <span *ngIf="!desbloqueado" class="text-[11px] text-slate-500 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    {{ 'ACHIEVEMENTS.LOCKED_STATUS' | translate }}
                </span>
            </div>

            <!-- Unlock date -->
            <div *ngIf="desbloqueado && fechaObtencion" class="text-[9px] text-slate-500 mt-1 font-mono">
                {{ fechaObtencion | date:'dd/MM/yyyy' }}
            </div>
        </div>

        <!-- RIGHT: Large Image -->
        <div class="flex-shrink-0 w-28 h-28 rounded-2xl flex items-center justify-center border border-white/5 bg-slate-800/60 group-hover:scale-110 transition-transform duration-300 overflow-visible"
            [ngClass]="desbloqueado ? rarezaBorderGlow : ''">

            <!-- Real Icon Image — oversized to pop out -->
            <img *ngIf="iconoUrl" [src]="'http://localhost' + iconoUrl" [alt]="nombre"
                class="w-52 h-52 object-contain drop-shadow-[0_4px_20px_rgba(168,85,247,0.3)]" loading="lazy" />

            <!-- Fallback: Lock icon -->
            <svg *ngIf="!iconoUrl" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="w-10 h-10 text-slate-500">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        </div>
    </div>
</div>
