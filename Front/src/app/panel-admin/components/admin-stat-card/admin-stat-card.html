<div
    class="bg-secondary-bg p-4 rounded-xl shadow-lg border border-white/10 flex flex-col justify-between h-full hover:border-accent-color/50 transition-all duration-300">
    <div class="flex justify-between items-start mb-2">
        <h3 class="text-text-muted text-sm font-bold uppercase tracking-wider">{{ title() }}</h3>
        @if(icon()) {
        <i [class]="'bi ' + icon() + ' text-accent-color text-xl'"></i>
        }
    </div>

    <div class="flex items-end justify-between mt-2">
        <div class="text-3xl font-black text-text-main tracking-tight">{{ value() }}</div>
        @if(trend()) {
        <div
            [class]="'text-xs font-semibold px-2 py-1 rounded bg-opacity-10 ' + (trendColor() === 'text-green-500' ? 'bg-green-500 text-green-400' : 'bg-red-500 text-red-400')">
            {{ trend() }}
        </div>
        }
    </div>
</div>
