<div class="min-height-screen transition-colors duration-700 pb-20 pt-6 overflow-hidden relative" [ngClass]="{
        'bg-primary-bg': !isEasterEggActive,
        'bg-black': isEasterEggActive
    }">

    <!-- Background Effects (Normal) -->
    <div *ngIf="!isEasterEggActive" class="absolute inset-0 pointer-events-none overflow-hidden h-full w-full">
        <!-- Overlay: Subtle gradient to ensure text readability on top of potential background image -->
        <div class="absolute inset-0 bg-gradient-to-br from-primary-bg via-primary-bg/80 to-secondary-bg/50"></div>
        <div class="absolute top-0 left-0 w-96 h-96 bg-accent-color/10 rounded-full blur-[120px] -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-accent-color/5 rounded-full blur-[100px] translate-x-1/2 translate-y-1/2"></div>
    </div>

    <!-- Background Effects (Easter Egg / Hacker Mode - Red/Black) -->
    <div *ngIf="isEasterEggActive" class="absolute inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute inset-0 bg-black opacity-90"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-red-900/30 via-transparent to-black pointer-events-none"></div>
    </div>

    <!-- Matrix/Gamer 'Glitch' Overlay -->
    <div *ngIf="showConfetti"
        class="fixed inset-0 pointer-events-none z-50 overflow-hidden flex flex-col items-center justify-center bg-black/80">
        <div class="relative">
            <h1 class="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-red-500 animate-pulse tracking-tighter"
                style="text-shadow: 0 0 30px rgba(220, 38, 38, 0.8);">
                HACKED
            </h1>
            <div class="absolute inset-0 text-9xl font-black text-red-600 mix-blend-screen opacity-50 animate-glitch-1">
                HACKED</div>
            <div
                class="absolute inset-0 text-9xl font-black text-blue-600 mix-blend-screen opacity-50 animate-glitch-2">
                HACKED</div>
        </div>
    </div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-12">

        <!-- 1. Header Hero Section -->
        <header class="relative">
            <!-- Breadcrumb / Back -->
            <button routerLink="/dashboard"
                class="group flex items-center gap-2 text-text-muted hover:text-text-main mb-6 transition-all"
                [class.text-red-500]="isEasterEggActive">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="group-hover:-translate-x-1 transition-transform">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                <span class="font-bold tracking-wide uppercase text-xs">Menu Principal</span>
            </button>

            <div class="flex flex-col md:flex-row justify-between items-end gap-8">
                <!-- Title & Intro -->
                <div class="max-w-2xl">
                    <h1 (click)="triggerEasterEgg()"
                        class="text-6xl md:text-7xl font-black text-text-main tracking-tighter uppercase cursor-pointer select-none transition-all duration-300 hover:tracking-widest"
                        [ngClass]="{'animate-pulse text-red-500 drop-shadow-[0_0_15px_rgba(220,38,38,0.8)]': isEasterEggActive}">
                        <span *ngIf="!isEasterEggActive">Logros <span
                                class="text-transparent bg-clip-text bg-gradient-to-r from-accent-color to-pink-500">Legendarios</span></span>
                        <span *ngIf="isEasterEggActive">SYSTEM <span class="text-red-600">BREACHED</span></span>
                    </h1>
                    <p class="text-xl text-text-muted mt-4 font-light leading-relaxed border-l-4 border-accent-color pl-4"
                        [class.border-red-600]="isEasterEggActive" [class.text-red-400]="isEasterEggActive">
                        Domina el código, desbloquea insignias y construye tu legado en el ranking global.
                    </p>
                </div>

                <!-- Global Rank Badge -->
                <div class="relative group cursor-help">
                    <div class="absolute -inset-1 bg-gradient-to-r from-accent-color to-pink-600 rounded-2xl blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"
                        [class.from-red-900]="isEasterEggActive" [class.to-red-600]="isEasterEggActive"></div>
                    <div
                        class="relative bg-secondary-bg ring-1 ring-white/10 rounded-xl p-6 flex items-center gap-6 backdrop-blur-xl">
                        <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-secondary-bg to-primary-bg p-1 border border-white/10">
                            <div
                                class="w-full h-full rounded-full bg-secondary-bg flex items-center justify-center overflow-hidden relative">
                                <div class="absolute inset-0 bg-accent-color/20 animate-spin-slow origin-center"
                                    [class.bg-red-600/20]="isEasterEggActive"></div>
                                <span class="relative text-2xl font-black text-text-main z-10">24</span>
                            </div>
                        </div>
                        <div>
                            <div class="text-xs font-bold text-text-muted uppercase tracking-widest mb-1">Nivel Actual
                            </div>
                            <div class="text-3xl font-black text-text-main tracking-wide">Desarrollador Senior
                            </div>
                            <div class="w-full h-1.5 bg-primary-bg rounded-full mt-3 overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-accent-color to-pink-500 w-[70%]"
                                    [class.from-red-600]="isEasterEggActive" [class.to-red-900]="isEasterEggActive">
                                </div>
                            </div>
                            <div class="text-[10px] text-right text-text-muted mt-1">1,250 / 2,000 XP</div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 2. Dashboard Stats (Floating Cards) -->
        <section
            class="grid grid-cols-1 md:grid-cols-3 gap-6 transform hover:scale-[1.01] transition-transform duration-500">
            <!-- Stat 1 -->
            <div
                class="bg-secondary-bg/40 backdrop-blur-md border border-white/5 p-6 rounded-2xl flex items-center gap-4 hover:bg-secondary-bg/60 transition-colors group relative overflow-hidden">
                <div
                    class="absolute right-0 top-0 w-24 h-24 bg-yellow-500/10 rounded-full blur-2xl -mr-10 -mt-10 group-hover:bg-yellow-500/20 transition-all">
                </div>
                <!-- SVG Trophy -->
                <div class="w-12 h-12 text-yellow-500 group-hover:scale-110 transition-transform duration-300">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                        <path d="M4 22h16" />
                        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
                        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
                        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-text-muted text-sm font-bold uppercase tracking-wider">Trofeos</h3>
                    <p class="text-4xl font-black text-text-main">4 <span class="text-lg text-text-muted">/
                            8</span></p>
                </div>
            </div>

            <!-- Stat 2 -->
            <div
                class="bg-secondary-bg/40 backdrop-blur-md border border-white/5 p-6 rounded-2xl flex items-center gap-4 hover:bg-secondary-bg/60 transition-colors group relative overflow-hidden">
                <div
                    class="absolute right-0 top-0 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl -mr-10 -mt-10 group-hover:bg-blue-500/20 transition-all">
                </div>
                <!-- SVG Diamond/Gem -->
                <div class="w-12 h-12 text-blue-400 group-hover:scale-110 transition-transform duration-300">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 3h12l4 6-10 13L2 9Z" />
                        <path d="M11 3 8 9l4 13 4-13-3-6" />
                        <path d="M2 9h20" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-text-muted text-sm font-bold uppercase tracking-wider">Total XP</h3>
                    <p class="text-4xl font-black text-text-main">900</p>
                </div>
            </div>

            <!-- Stat 3 -->
            <div
                class="bg-secondary-bg/40 backdrop-blur-md border border-white/5 p-6 rounded-2xl flex items-center gap-4 hover:bg-secondary-bg/60 transition-colors group relative overflow-hidden">
                <div
                    class="absolute right-0 top-0 w-24 h-24 bg-orange-500/10 rounded-full blur-2xl -mr-10 -mt-10 group-hover:bg-orange-500/20 transition-all">
                </div>
                <!-- SVG Flame -->
                <div class="w-12 h-12 text-orange-500 group-hover:scale-110 transition-transform duration-300">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.115.385-2.256 1-3.24" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-text-muted text-sm font-bold uppercase tracking-wider">Racha</h3>
                    <p class="text-4xl font-black text-text-main">5 Días</p>
                </div>
            </div>
        </section>

        <!-- 3. Filter Navigation -->
        <nav class="flex justify-center md:justify-start">
            <div class="inline-flex p-1 bg-secondary-bg/80 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl">
                <button
                    class="relative px-6 py-2 rounded-lg text-sm font-bold text-white transition-all overflow-hidden group">
                    <span
                        class="absolute inset-0 bg-gradient-to-r from-accent-color to-indigo-600 opacity-100 group-hover:opacity-90 transition-opacity"
                        [class.from-red-700]="isEasterEggActive" [class.to-red-900]="isEasterEggActive"></span>
                    <span class="relative z-10">Todos</span>
                </button>
                <button
                    class="px-6 py-2 rounded-lg text-sm font-bold text-text-muted hover:text-text-main hover:bg-white/5 transition-all">
                    Desbloqueados
                </button>
                <button
                    class="px-6 py-2 rounded-lg text-sm font-bold text-text-muted hover:text-text-main hover:bg-white/5 transition-all">
                    Bloqueados
                </button>
            </div>
        </nav>

        <!-- 4. Achievements Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 perspective-1000">

            <!-- Loop items manually for now since we don't have a data array -->
            <app-logro title="Primer Paso" description="Completa tu primer desafío" [points]="50" rarity="Común"
                icon="step" [isLocked]="false"
                class="transition-all duration-500 hover:z-20 hover:scale-105"></app-logro>
            <app-logro title="Pythonista" description="Completa 50 desafíos" [points]="500" rarity="Épico" icon="code"
                [isLocked]="false" class="transition-all duration-500 hover:z-20 hover:scale-105"></app-logro>
            <app-logro title="Racha de Fuego" description="Practica 10 días" [points]="200" rarity="Raro" icon="fire"
                [isLocked]="false" class="transition-all duration-500 hover:z-20 hover:scale-105"></app-logro>

            <!-- Specific Easter Egg Item that only appears/glows when active? Or just style changes on all -->
            <app-logro title="Hacker" description="Encuentra el secreto" [points]="9999" rarity="Legendario"
                icon="hacker" [isLocked]="!isEasterEggActive" [class.hidden]="!isEasterEggActive"></app-logro>

            <app-logro title="Velocista" description="Nivel < 2 min" [points]="150" rarity="Raro" icon="lightning"
                [isLocked]="false" class="transition-all duration-500 hover:z-20 hover:scale-105"></app-logro>
            <app-logro title="Perfeccionista" description="100/100 en 5 desafíos" [points]="300" rarity="Épico"
                icon="target" [isLocked]="true" [currentProgress]="3" [maxProgress]="5"></app-logro>
            <app-logro title="Maestro" description="Completa todo" [points]="1000" rarity="Legendario" icon="crown"
                [isLocked]="true" [currentProgress]="47" [maxProgress]="100"></app-logro>
            <app-logro title="Bug Hunter" description="Reporta 3 bugs" [points]="200" rarity="Raro" icon="bug"
                [isLocked]="true" [currentProgress]="1" [maxProgress]="3"></app-logro>

        </div>

    </div>
</div>
