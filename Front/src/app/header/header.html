@if (!isDashboard()) {
<header
    class="sticky top-0 z-50 w-full backdrop-blur-lg transition-colors duration-300 bg-secondary-bg/70 border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Logo (Left) -->
            <a routerLink="/dashboard" class="flex items-center gap-2 group">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-color to-blue-600 flex items-center justify-center text-white font-bold font-jersey text-xl shadow-lg shadow-accent-color/20 group-hover:scale-105 transition-transform">
                    C
                </div>
                <span
                    class="font-jersey text-2xl text-text-main tracking-wide group-hover:text-accent-color transition-colors">Codeo</span>
            </a>

            <!-- Right Side: Navigation + Theme Toggle -->
            <div class="flex items-center gap-6">
                <!-- Navigation (Only visible if logged in) -->
                @if (isLoggedIn()) {
                    <nav class="hidden md:flex items-center gap-1">
                        <a routerLink="/dashboard" routerLinkActive="bg-accent-color/10 text-accent-color"
                            class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-accent-color hover:bg-white/5 transition-all">
                            Inicio
                        </a>
                        
                        @if (isAdmin()) {
                            <a routerLink="/panel-admin" routerLinkActive="bg-red-500/10 text-red-600"
                                class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-red-600 hover:bg-white/5 transition-all flex items-center gap-2">
                                Admin
                            </a>
                        }

                        <a routerLink="/ranking" routerLinkActive="bg-accent-color/10 text-accent-color"
                           class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-accent-color hover:bg-white/5 transition-all">
                            Ranking
                        </a>

                        <a routerLink="/tienda-temas" routerLinkActive="bg-accent-color/10 text-accent-color"
                            class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-accent-color hover:bg-white/5 transition-all flex items-center gap-2">
                            Tienda
                        </a>

                        <a routerLink="/ajustes" routerLinkActive="bg-accent-color/10 text-accent-color"
                            class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-accent-color hover:bg-white/5 transition-all">
                            Ajustes
                        </a>
                    </nav>
                }
                
            </div>
        </div>
    </div>
</header>
}
