@if (!isDashboard()) {
<header
    class="sticky top-0 z-50 w-full backdrop-blur-lg transition-colors duration-300 bg-secondary-bg/70 border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Logo (Left) -->
            <a routerLink="/dashboard" class="flex items-center gap-2 group">
                <div
                    class="w-8 h-8 rounded-lg bg-accent-color flex items-center justify-center font-black text-white text-sm font-jersey transition-transform group-hover:scale-110">
                    C
                </div>
                <span class="font-bold text-text-main tracking-tight">Codeo</span>
            </a>

            <!-- Nav Links (Center) -->
            <nav class="hidden md:flex items-center gap-1">
                <a routerLink="/dashboard" routerLinkActive="text-text-main bg-white/5"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-text-main hover:bg-white/5 transition-all">
                    {{ 'HEADER.DASHBOARD' | translate }}
                </a>
                <a routerLink="/modo-historia" routerLinkActive="text-text-main bg-white/5"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-text-main hover:bg-white/5 transition-all">
                    {{ 'HEADER.STORY' | translate }}
                </a>
                <a routerLink="/modo-infinito" routerLinkActive="text-text-main bg-white/5"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-text-main hover:bg-white/5 transition-all">
                    {{ 'HEADER.INFINITE' | translate }}
                </a>
            </nav>

            <!-- Actions (Right) -->
            <div class="flex items-center gap-3">
                @if (isLoggedIn()) {
                <button (click)="logout()"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-text-main hover:bg-white/5 transition-all">
                    {{ 'HEADER.LOGOUT' | translate }}
                </button>
                } @else {
                <a routerLink="/login"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-text-muted hover:text-text-main hover:bg-white/5 transition-all">
                    {{ 'HEADER.LOGIN' | translate }}
                </a>
                <a routerLink="/registro"
                    class="px-4 py-2 rounded-lg text-sm font-bold bg-accent-color text-white hover:bg-accent-color/90 transition-all">
                    {{ 'HEADER.REGISTER' | translate }}
                </a>
                }
            </div>
        </div>
    </div>
</header>
}
